<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fosk — Login</title>
  <link rel="icon" type="image/png" href="/static/Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f111a;
      --bg-card: rgba(30, 34, 51, 0.7);
      --accent: #9333ea;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-box: border-box; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-blobs {
      position: absolute; inset: 0; z-index: -1;
      background: radial-gradient(circle at 20% 30%, rgba(147, 51, 234, 0.15), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.1), transparent 40%);
    }

    .container {
      width: 100%; max-width: 800px;
      padding: 40px; text-align: center;
      animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .logo { width: 80px; height: 80px; margin-bottom: 24px; filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.4)); }
    h1 { font-family: 'Syne', sans-serif; font-size: 32px; margin-bottom: 8px; font-weight: 800; }
    p { color: var(--text-muted); margin-bottom: 48px; }

    /* Profile Grid */
    .profile-grid {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 32px;
    }

    .profile-card {
      cursor: pointer; width: 140px;
      transition: var(--transition);
    }
    .profile-card:hover { transform: scale(1.05); }

    .avatar {
      width: 140px; height: 140px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 700; color: var(--accent);
      margin-bottom: 12px; transition: var(--transition);
      backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .profile-card:hover .avatar { border-color: var(--accent); box-shadow: 0 0 30px rgba(147, 51, 234, 0.3); }
    .profile-name { font-weight: 700; font-size: 16px; }

    /* Setup & Login Forms */
    .form-card {
      background: var(--bg-card);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 48px; width: 100%; max-width: 450px;
      margin: 0 auto; text-align: left;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
    input {
      width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px; color: white;
      font-family: inherit; font-size: 15px; outline: none; transition: var(--transition);
    }
    input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }

    .btn {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: 12px; padding: 16px; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: var(--transition); margin-top: 12px;
    }
    .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-top: 8px; }
    .btn-secondary:hover { border-color: var(--text-muted); color: white; }

    .hidden { display: none; }

    /* Folder list in setup */
    .folder-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .add-folder-btn { color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; background:none; border:none; margin-bottom: 16px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #1e2233; color: white; padding: 12px 24px; border-radius: 12px;
      border-left: 4px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000; opacity: 0; transition: var(--transition); pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <!-- ── Portal Content ────────────────────────────────────────────────── -->
  <div class="container">
    <img src="/static/Logo.png" alt="Fosk Logo" class="logo">
    
    <!-- 1. Profile Picker -->
    <div id="view-picker" class="hidden">
      <h1>Bentornato</h1>
      <p>Chi sta ascoltando oggi?</p>
      <div class="profile-grid" id="profile-grid">
        <!-- Profiles injected here -->
      </div>
    </div>

    <!-- 2. Setup Form -->
    <div id="view-setup" class="hidden">
      <div class="form-card">
        <h1 style="font-size:24px">Configura Fosk</h1>
        <p style="margin-bottom:32px">Crea il tuo account admin e aggiungi la musica.</p>
        
        <div class="input-group">
          <label>Admin Username</label>
          <input type="text" id="setup-user" placeholder="Esempio: Ale">
        </div>
        <div class="input-group">
          <label>Password (Opzionale)</label>
          <input type="password" id="setup-pass" placeholder="Lascia vuoto per accesso libero">
        </div>
        <div class="input-group">
          <label>Cartelle Musicali</label>
          <div id="setup-folders">
            <div class="folder-row"><input type="text" class="folder-input" placeholder="Percorso cartella..."></div>
          </div>
          <button class="add-folder-btn" onclick="addFolderField()">+ Aggiungi un'altra</button>
        </div>
        <button class="btn" id="btn-setup" onclick="doSetup()">Completa Configurazione</button>
      </div>
    </div>

    <!-- 3. Login Modal -->
    <div id="view-login" class="hidden">
      <div class="form-card">
        <h1 id="login-title" style="font-size:24px">Ciao Ale</h1>
        <p id="login-subtitle">Inserisci la tua password per accedere.</p>
        
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="••••••••" autofocus>
        </div>
        <button class="btn" id="btn-login" onclick="doLogin()">Accedi</button>
        <button class="btn btn-secondary" onclick="showPicker()">Cambia utente</button>
      </div>
    </div>

    <!-- 4. Loading State -->
    <div id="view-loading">
      <div style="font-size:24px">🚀</div>
    </div>
  </div>

  <div id="toast">Messaggio</div>

  <script>
    let selectedUser = null;

    async function init() {
      const res = await fetch('/api/setup/status');
      const data = await res.json();

      if (data.setup_done) {
        await loadProfiles();
      } else {
        showView('setup');
      }
    }

    async function loadProfiles() {
      const res = await fetch('/api/users');
      const data = await res.json();
      
      const grid = document.getElementById('profile-grid');
      grid.innerHTML = '';
      
      data.users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'profile-card';
        div.onclick = () => selectProfile(u);
        
        const initial = u.username.charAt(0).toUpperCase();
        div.innerHTML = `
          <div class="avatar">${initial}</div>
          <div class="profile-name">${u.username}</div>
        `;
        grid.appendChild(div);
      });
      
      showView('picker');
    }

    function selectProfile(user) {
      if (!user.has_password) {
        // Direct login
        login(user.username, "");
      } else {
        selectedUser = user;
        document.getElementById('login-title').textContent = `Ciao ${user.username}`;
        showView('login');
        document.getElementById('login-pass').focus();
      }
    }

    async function login(username, password) {
      const btn = document.getElementById('btn-login');
      btn.disabled = true;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('fosk_is_admin', data.is_admin ? 'true' : 'false');
        window.location.href = '/app';
      } else {
        const err = await res.json();
        toast(err.detail || 'Accesso fallito', 'error');
        btn.disabled = false;
      }
    }

    async function doLogin() {
      const pass = document.getElementById('login-pass').value;
      login(selectedUser.username, pass);
    }

    async function doSetup() {
      const user = document.getElementById('setup-user').value.trim();
      const pass = document.getElementById('setup-pass').value;
      const folders = Array.from(document.querySelectorAll('.folder-input'))
        .map(i => i.value.trim()).filter(v => v);

      if (!user) return toast('Inserisci un nome utente');
      if (folders.length === 0) return toast('Inserisci almeno una cartella');

      const btn = document.getElementById('btn-setup');
      btn.disabled = true;
      btn.textContent = 'Configurazione in corso...';

      const res = await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass, folders })
      });

      if (res.ok) {
        window.location.href = '/app';
      } else {
        toast('Errore durante il setup');
        btn.disabled = false;
        btn.textContent = 'Completa Configurazione';
      }
    }

    function addFolderField() {
      const div = document.createElement('div');
      div.className = 'folder-row';
      div.innerHTML = '<input type="text" class="folder-input" placeholder="Percorso cartella...">';
      document.getElementById('setup-folders').appendChild(div);
    }

    function showView(id) {
      ['picker', 'setup', 'login', 'loading'].forEach(v => {
        document.getElementById('view-' + v).classList.toggle('hidden', v !== id);
      });
    }

    function showPicker() { showView('picker'); }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Handle Enter key in login
    document.getElementById('login-pass').onkeydown = e => { if(e.key === 'Enter') doLogin(); };

    init();
  </script>
</body>
</html>
