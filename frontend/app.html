<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fosk</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="/static/Logo.png" />
</head>

<body class="premium">
  <div id="bg-blur"></div>
  <div id="app">

    <!-- ── Sidebar ───────────────────────────────────────────────────── -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <img src="/static/Logo.png" alt="Fosk Logo" class="logo-img" />
        Fosk
      </div>

      <div class="sidebar-section">
        <div class="nav-item active" data-view="home">
          <span class="icon"><svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span> Home
        </div>
        <div class="nav-item" data-view="library">
          <span class="icon"><svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"></path><path d="m3 9 2.45-4.91A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.09L21 9"></path><path d="M12 3v6"></path></svg></span> Libreria
        </div>
        <div class="nav-item" data-view="discover">
          <span class="icon"><svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg></span> Discover
        </div>
        <div class="nav-item" data-view="favorites">
          <span class="icon"><svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg></span> Preferiti
        </div>
        <div class="nav-item" data-view="settings">
          <span class="icon"><svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg></span> Impostazioni
        </div>
        <div class="nav-item admin-only" data-view="users" style="display:none">
          <span class="icon"><svg class="icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span> Utenti
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Cartelle</div>
      </div>
      <div id="folder-list">
        <!-- injected by JS -->
      </div>

      <div style="margin-top:auto; padding:20px">
        <button class="btn btn-secondary" style="width:100%; font-size:12px; padding:8px" onclick="window.location.href='/'">
          👤 Cambia Profilo
        </button>
        <button class="btn btn-secondary" style="width:100%; font-size:12px; padding:8px; margin-top:8px" onclick="logout()">
          🚪 Esci (Logout)
        </button>
      </div>
    </aside>

    <!-- ── Main Content ──────────────────────────────────────────────── -->
    <main id="main">
      <div class="main-header">
        <div>
          <div class="main-title" id="main-title">Ciao 👋</div>
          <div class="main-subtitle" id="main-subtitle">Inizia aggiungendo una cartella musicale</div>
        </div>
        <div class="search-bar">
          <svg class="icon-svg search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="search-input" placeholder="Cerca titolo, artista…" />
        </div>
      </div>

      <div id="content" class="view-transition">
        <!-- dynamic content injected here -->
      </div>
    </main>

    <!-- ── Right Panel ───────────────────────────────────────────────── -->
    <aside id="right-panel">
      <div class="now-playing-header">In riproduzione</div>

      <div class="now-playing-cover" id="np-cover">
        <span id="np-cover-placeholder">♫</span>
        <img id="np-cover-img" src="" alt="" style="display:none" />
      </div>

      <div class="now-playing-meta">
        <div class="now-playing-title" id="np-title">—</div>
        <div class="now-playing-artist" id="np-artist">—</div>
      </div>

      <div class="lyrics-container" id="lyrics-container">
        <div class="lyrics-title">Testi</div>
        <div id="lyrics-content">
          <div class="no-lyrics">Seleziona un brano per vedere i testi</div>
        </div>
      </div>
    </aside>

    <!-- ── Player Bar ────────────────────────────────────────────────── -->
    <div id="player">
      <!-- Left: track info -->
      <div class="player-track-info">
        <div class="player-thumb" id="player-thumb">
          <span id="player-thumb-icon">♫</span>
          <img id="player-thumb-img" src="" alt="" style="display:none" />
        </div>
        <div style="min-width:0; z-index:2">
          <div class="player-track-title" id="player-title">Nessun brano</div>
          <div class="player-track-artist" id="player-artist">—</div>
        </div>
        <button class="btn-like" id="player-btn-like" style="margin-left:12px;display:none">❤️</button>
      </div>

      <!-- Center: controls + progress -->
      <div class="player-controls">
        <div class="player-buttons">
          <button class="player-btn" id="btn-shuffle" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
          </button>
          <button class="player-btn" id="btn-prev" title="Precedente">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
          </button>
          <button class="player-btn play-pause" id="btn-play" title="Play / Pause">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          </button>
          <button class="player-btn" id="btn-next" title="Successivo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
          </button>
          <button class="player-btn" id="btn-repeat" title="Ripeti">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
          </button>
        </div>
        <div class="progress-row">
          <span class="time-label" id="time-current">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            <div class="progress-handle" id="progress-handle" style="left:0%"></div>
          </div>
          <span class="time-label right" id="time-total">0:00</span>
        </div>
      </div>

      <!-- Right: volume + utils -->
      <div class="player-volume">
        <span class="volume-icon" id="vol-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        </span>
        <div class="volume-slider" id="volume-bar">
          <div class="volume-fill" id="volume-fill" style="width:80%"></div>
        </div>
        <button class="player-btn util-btn" id="btn-pip" title="Mini-player">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M13 11l4 4m0 0l-4 4m4-4H9"/></svg>
        </button>
        <button class="player-btn util-btn" id="btn-fs" title="Fullscreen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 15v6h-6M3 9V3h6"/></svg>
        </button>
      </div>
    </div>

  </div><!-- #app -->

  <!-- Fullscreen View Overlay -->
  <div id="fullscreen-view">
    <div id="fs-bg"></div>
    <button id="fs-close" onclick="closeFullscreen()">✕</button>
    
    <div class="fs-content">
      <div class="fs-main">
        <div class="fs-cover-wrap">
          <img id="fs-cover" src="" alt="" />
        </div>
        <div class="fs-meta">
          <h1 id="fs-title"></h1>
          <h2 id="fs-artist"></h2>
          
          <div class="fs-controls">
            <button class="fs-btn" onclick="playPrev()">⏮</button>
            <button class="fs-btn fs-play" id="fs-btn-play" onclick="togglePlay()">▶</button>
            <button class="fs-btn" onclick="playNext()">⏭</button>
          </div>
        </div>
      </div>
      
      <div class="fs-lyrics">
        <div id="fs-lyrics-content">
          <!-- Synced lyrics injected here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scan overlay -->
  <div id="scan-overlay">
    <div class="scan-modal">
      <div class="scan-spinner"></div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px">Scansione in corso…
      </div>
      <div style="color:var(--text-muted);font-size:13px">Sto analizzando i tuoi file audio</div>
    </div>
  </div>


  <!-- Toast container -->
  <div id="toast-container"></div>

  <audio id="audio-element" preload="none"></audio>

  <script src="/static/app.js"></script>
</body>

</html>
